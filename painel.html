<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard ADM - Sorteio</title>

  <style>
    body{
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header{
      background: #1a1a1a;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      color: gold;
      font-weight: bold;
    }

    .container{
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
      padding: 20px;
    }

    .card{
      background: #1c1c1c;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 0 10px rgba(255,215,0,0.1);
    }

    h2{
      font-size: 16px;
      color: gold;
      margin-bottom: 10px;
    }

    button{
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px 0;
      font-weight: bold;
    }

    .sortear{ background: gold; }
    .limpar{ background: red; color: white; width: 100%; }
    .logout{ background: #333; color: white; width: 100%; }

    .participante{
      background: #222;
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }

    .vencedor-box{
      font-size: 20px;
      color: gold;
      text-align: center;
      padding: 10px;
      background: #111;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .lista-vencedores li{
      list-style: none;
      background: #222;
      margin: 5px 0;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }

    .btn-del{
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 3px 6px;
      cursor: pointer;
    }

    @media(max-width: 900px){
      .container{
        grid-template-columns: 1fr;
      }
    }

  </style>

</head>

<body>

<header>
  🎯 Dashboard ADM - Sistema de Sorteio
</header>

<div class="container">

  <!-- CONTROLE -->
  <div class="card">
    <h2>🎮 Controle</h2>

    <div class="vencedor-box" id="vencedor">
      Aguardando sorteio...
    </div>

    <button class="sortear" id="sortearBtn">🎲 Sortear</button>
    <button class="limpar" id="limparBtn">🗑 Limpar Tudo</button>
    <button class="logout" id="logoutBtn">🚪 Sair</button>
  </div>

  <!-- PARTICIPANTES -->
  <div class="card">
    <h2>👥 Participantes</h2>
    <div id="listaParticipantes"></div>
  </div>

  <!-- VENCEDORES -->
  <div class="card">
    <h2>🏆 Últimos Vencedores</h2>
    <ul id="listaVencedores" class="lista-vencedores"></ul>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  deleteDoc,
  doc,
  addDoc,
  serverTimestamp,
  query,
  orderBy,
  limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPqYV2mrs1OY-_v_TMk-rZshKABDdj5tk",
  authDomain: "sorteio-tcc.firebaseapp.com",
  projectId: "sorteio-tcc",
  storageBucket: "sorteio-tcc.firebasestorage.app",
  messagingSenderId: "1074964072990",
  appId: "1:1074964072990:web:fe6b58d17c7d572d83fc0f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let participantes = [];

const lista = document.getElementById("listaParticipantes");

// 🏆 salvar vencedor
async function salvarVencedor(nome){
  await addDoc(collection(db, "vencedores"), {
    nome,
    data: serverTimestamp()
  });
}

// remover vencedor
window.removerVencedor = async (id) => {
  await deleteDoc(doc(db, "vencedores", id));
};

// vencedores
function carregarVencedores(){

  const listaV = document.getElementById("listaVencedores");

  const q = query(
    collection(db, "vencedores"),
    orderBy("data", "desc"),
    limit(5)
  );

  onSnapshot(q, (snap) => {

    listaV.innerHTML = "";

    snap.forEach((d) => {

      listaV.innerHTML += `
        <li>
          🏆 ${d.data().nome}
          <button class="btn-del" onclick="removerVencedor('${d.id}')">❌</button>
        </li>
      `;
    });

  });
}

// participantes
async function carregarParticipantes(){

  lista.innerHTML = "";
  participantes = [];

  const snap = await getDocs(collection(db, "participantes"));

  snap.forEach((d) => {

    participantes.push({ id: d.id, nome: d.data().nome });

    lista.innerHTML += `
      <div class="participante">
        <span>${d.data().nome}</span>
        <button onclick="removerParticipante('${d.id}')">❌</button>
      </div>
    `;
  });
}

window.removerParticipante = async (id) => {
  await deleteDoc(doc(db, "participantes", id));
  carregarParticipantes();
};

// limpar
document.getElementById("limparBtn").onclick = async () => {

  const snap = await getDocs(collection(db, "participantes"));

  snap.forEach(async (d) => {
    await deleteDoc(doc(db, "participantes", d.id));
  });

  carregarParticipantes();
};

// sortear
document.getElementById("sortearBtn").onclick = async () => {

  if(participantes.length === 0){
    alert("Nenhum participante.");
    return;
  }

  const sorteado =
    participantes[Math.floor(Math.random() * participantes.length)];

  document.getElementById("vencedor").innerHTML =
    "🎉 Vencedor: " + sorteado.nome;

  await salvarVencedor(sorteado.nome);
};

// logout
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  localStorage.removeItem("adminLogado");
  window.location.href = "login.html";
};

carregarParticipantes();
carregarVencedores();

</script>

</body>
</html>
