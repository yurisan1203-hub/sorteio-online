<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel ADM</title>

  <style>
    body{
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1{ color: gold; }

    button{
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
      font-weight: bold;
    }

    .sortear{ background: gold; }
    .limpar{ background: red; color: white; }
    .logout{ background: #444; color: white; }

    .participante{
      background: #222;
      margin: 10px auto;
      padding: 10px;
      border-radius: 10px;
      max-width: 400px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .vencedor{
      margin-top: 20px;
      font-size: 25px;
      color: gold;
      font-weight: bold;
    }

    .lista-vencedores{
      margin-top: 30px;
    }

    .lista-vencedores li{
      list-style: none;
      background: #222;
      margin: 5px auto;
      padding: 8px;
      border-radius: 8px;
      max-width: 300px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-del{
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 3px 8px;
      cursor: pointer;
    }

  </style>

</head>

<body>

  <h1>Painel Administrador</h1>

  <button class="sortear" id="sortearBtn">Sortear</button>
  <button class="limpar" id="limparBtn">Limpar Tudo</button>
  <button class="logout" id="logoutBtn">Sair</button>

  <div class="vencedor" id="vencedor"></div>

  <h2>Participantes</h2>
  <div id="listaParticipantes"></div>

  <h2>🏆 Últimos Vencedores</h2>
  <ul id="listaVencedores" class="lista-vencedores"></ul>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs,
      deleteDoc,
      doc,
      addDoc,
      serverTimestamp,
      query,
      orderBy,
      limit,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    import {
      getAuth,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBPqYV2mrs1OY-_v_TMk-rZshKABDdj5tk",
      authDomain: "sorteio-tcc.firebaseapp.com",
      projectId: "sorteio-tcc",
      storageBucket: "sorteio-tcc.firebasestorage.app",
      messagingSenderId: "1074964072990",
      appId: "1:1074964072990:web:fe6b58d17c7d572d83fc0f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const lista = document.getElementById("listaParticipantes");

    let participantes = [];

    // 🏆 SALVAR VENCEDOR
    async function salvarVencedor(nome){
      await addDoc(collection(db, "vencedores"), {
        nome: nome,
        data: serverTimestamp()
      });
    }

    // 🗑️ EXCLUIR VENCEDOR
    window.removerVencedor = async (id) => {
      await deleteDoc(doc(db, "vencedores", id));
    };

    // 🏆 LISTA DE VENCEDORES (TEMPO REAL)
    function carregarVencedores(){

      const listaV = document.getElementById("listaVencedores");

      const q = query(
        collection(db, "vencedores"),
        orderBy("data", "desc"),
        limit(5)
      );

      onSnapshot(q, (snapshot) => {

        listaV.innerHTML = "";

        snapshot.forEach((docItem) => {

          const v = docItem.data();

          listaV.innerHTML += `
            <li>
              🏆 ${v.nome}
              <button class="btn-del" onclick="removerVencedor('${docItem.id}')">❌</button>
            </li>
          `;
        });
      });
    }

    // PARTICIPANTES
    async function carregarParticipantes(){

      lista.innerHTML = "";
      participantes = [];

      const querySnapshot = await getDocs(collection(db, "participantes"));

      querySnapshot.forEach((docItem) => {

        const dados = docItem.data();

        participantes.push({
          id: docItem.id,
          nome: dados.nome
        });

        lista.innerHTML += `
          <div class="participante">
            <span>${dados.nome}</span>
            <button onclick="removerParticipante('${docItem.id}')">❌</button>
          </div>
        `;
      });
    }

    window.removerParticipante = async (id) => {
      await deleteDoc(doc(db, "participantes", id));
      carregarParticipantes();
    };

    document.getElementById("limparBtn").onclick = async () => {

      const confirmar = confirm("Deseja apagar todos participantes?");
      if(!confirmar) return;

      const querySnapshot = await getDocs(collection(db, "participantes"));

      querySnapshot.forEach(async (docItem) => {
        await deleteDoc(doc(db, "participantes", docItem.id));
      });

      carregarParticipantes();
    };

    // 🎲 SORTEAR
    document.getElementById("sortearBtn").onclick = async () => {

      if(participantes.length === 0){
        alert("Nenhum participante.");
        return;
      }

      const sorteado =
        participantes[Math.floor(Math.random() * participantes.length)];

      document.getElementById("vencedor").innerHTML =
        "🎉 Vencedor: " + sorteado.nome;

      await salvarVencedor(sorteado.nome);
    };

    document.getElementById("logoutBtn").onclick = async () => {

      await signOut(auth);
      localStorage.removeItem("adminLogado");
      window.location.href = "login.html";
    };

    carregarParticipantes();
    carregarVencedores();

  </script>

</body>

</html>
